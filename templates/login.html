{% extends "base.html" %}

{% block contentname %}
{% load static %}

<section id="login" class="content-section">
    <div class="container">
        <h2 class="section-title">Login</h2>
        <div class="section-divider"></div>
        <p class="login-intro">
            Please fill out login details below to login.
        </p>
        
        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <button type="submit" class="submit-button">Login</button>
            
            <div id="loginMessage" style="margin-top: 15px;"></div>
        </form>
        
        <p class="register-link"> 
            <a class="register-url" href="{% url 'register' %}">
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                Don't have an account? Register here
            </a>
        </p>
    </div>
</section>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

async function handleLogin(event) {
    event.preventDefault();
    
    const form = document.getElementById('loginForm');
    const messageDiv = document.getElementById('loginMessage');
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        const response = await fetch('/profiledetails/api/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });
        
        const data = await response.json();
        
        console.log('Response:', data);
        
        if (data.success === true) {
            messageDiv.innerHTML = `<div style="padding: 15px; background-color: rgba(34, 197, 94, 0.2); color: #22c55e; border-radius: 5px; border-left: 4px solid #22c55e;">${data.message}</div>`;
            
            // Redirect to dashboard after 1.5 seconds
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            const errorMsg = data.error || JSON.stringify(data);
            messageDiv.innerHTML = `<div style="padding: 15px; background-color: rgba(239, 68, 68, 0.2); color: #ef4444; border-radius: 5px; border-left: 4px solid #ef4444;">${errorMsg}</div>`;
        }
    } catch (error) {
        console.error('Error:', error);
        messageDiv.innerHTML = `<div style="padding: 15px; background-color: rgba(239, 68, 68, 0.2); color: #ef4444; border-radius: 5px; border-left: 4px solid #ef4444;">An error occurred. Please try again.</div>`;
    }
}
</script>

{% endblock %}
