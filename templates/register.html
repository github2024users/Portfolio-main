{% extends "base.html" %}

{% block contentname %}
{% load static %}

<section id="register" class="content-section">
    <div class="container">
        <h2 class="section-title">Register Yourself</h2>
        <div class="section-divider"></div>
        <p class="register-intro">
            Please fill out the form below to register yourself.
        </p>
        
        <form class="contact-form" id="registerForm" onsubmit="handleRegister(event)">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="first_name" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="6"></textarea>
            </div>

            <button type="submit" class="submit-button">Submit</button>
            
            <div id="registerMessage" style="margin-top: 15px;"></div>
        </form>
        
        <p class="register-link"> 
            <a class="register-url" href="{% url 'login' %}">
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                &nbsp;&nbsp;&nbsp;&nbsp;Have an account? Login here
            </a>
        </p>
    </div>
</section>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

async function handleRegister(event) {
    event.preventDefault();
    
    const form = document.getElementById('registerForm');
    const messageDiv = document.getElementById('registerMessage');
    
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const first_name = document.getElementById('name').value;
    const password = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    const phone = document.getElementById('phone').value;
    const bio = document.getElementById('bio').value;
    
    try {
        const response = await fetch('/profiledetails/api/register/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                username: username,
                email: email,
                first_name: first_name,
                password: password,
                confirm_password: confirm_password,
                phone: phone,
                bio: bio
            })
        });
        
        const data = await response.json();
        
        console.log('Response:', data);
        
        if (data.success === true) {
            messageDiv.innerHTML = `<div style="padding: 15px; background-color: rgba(34, 197, 94, 0.2); color: #22c55e; border-radius: 5px; border-left: 4px solid #22c55e;">${data.message}</div>`;
            
            // Redirect to login after 2 seconds
            setTimeout(() => {
                window.location.href = '/login';
            }, 2000);
        } else {
            const errorMsg = data.error || JSON.stringify(data);
            messageDiv.innerHTML = `<div style="padding: 15px; background-color: rgba(239, 68, 68, 0.2); color: #ef4444; border-radius: 5px; border-left: 4px solid #ef4444;">${errorMsg}</div>`;
        }
    } catch (error) {
        console.error('Error:', error);
        messageDiv.innerHTML = `<div style="padding: 15px; background-color: rgba(239, 68, 68, 0.2); color: #ef4444; border-radius: 5px; border-left: 4px solid #ef4444;">An error occurred. Please try again.</div>`;
    }
}
</script>

{% endblock %}
